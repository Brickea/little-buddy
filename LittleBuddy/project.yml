name: LittleBuddy
options:
  bundleIdPrefix: com.littlebuddy
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
targets:
  LittleBuddy:
    type: application
    platform: iOS
    sources:
      - Sources/LittleBuddy
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
  LittleBuddyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Sources/LittleBuddyTests
    dependencies:
      - target: LittleBuddy
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.9"
